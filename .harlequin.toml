default_profile = "default"

[profiles.default]
adapter = "sqlite"
theme = "gruvbox"
limit = 10000000
keymap_name = ["vscode"]

[profiles.default.keymap]
# Panel navigation shortcuts
"ctrl+h" = "focus_catalog"
"ctrl+j" = "focus_results"
"ctrl+k" = "focus_query_editor"
"ctrl+l" = "focus_next"
"ctrl+x" = "quit"

# Cursor movement shortcuts (using alt to preserve SQL typing)
"alt+h" = "cursor_left"
"alt+j" = "cursor_down"
"alt+k" = "cursor_up"
"alt+l" = "cursor_right"
"alt+b" = "cursor_word_left"
"alt+w" = "cursor_word_right"
"alt+0" = "cursor_line_start"
"alt+$" = "cursor_line_end"
"alt+g" = "cursor_page_up"
"shift+alt+g" = "cursor_page_down"
"alt+y" = "copy"
# "alt+t" = "scroll_home"
# "alt+b" = "scroll_end"
