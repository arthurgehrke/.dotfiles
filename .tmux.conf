set-option -g prefix C-b

set -g default-terminal "tmux-256color"
set -as terminal-features ",xterm-256color:RGB"
set -g escape-time 0
set -g status-interval 30
set -g visual-activity off
set -g visual-bell off
set -g visual-silence off
set -g bell-action none
set -g base-index 1
setw -g pane-base-index 1
setw -g aggressive-resize off
setw -g automatic-rename off
set -g renumber-windows on
set -g history-limit 20000
setw -g mode-keys vi
set -g mouse on
set -g set-clipboard on
set -as terminal-features ',*:clipboard'
set -g focus-events on
set -g alternate-screen on
set -g status-right '#[fg=green]%R #[fg=yellow]| #S'
set -g set-titles off

########################## binds #############################################################################################################
bind-key -n S-Left swap-window -t -1
bind-key -n S-Right swap-window -t +1
bind-key h select-pane -L
bind-key l select-pane -R
bind-key k select-pane -U
bind-key j select-pane -D
bind-key -r J resize-pane -D 3
bind-key -r K resize-pane -U 3
bind-key -r H resize-pane -L 3
bind-key -r L resize-pane -R 3
bind-key | split-window -h -c "#{pane_current_path}"
bind-key - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind '%'
bind c new-window -c "#{pane_current_path}"
bind-key & kill-window
bind-key x kill-pane
bind C-u command-prompt -p "Session to merge with: " \
   "run-shell 'yes | head -n #{session_windows} | xargs -I {} -n 1 tmux movew -t %%'"
bind R source-file ~/.tmux.conf \; display "Config reloaded"

setw -g mode-keys vi

bind-key -T copy-mode-vi i switch-client -T copy-in
bind-key -T copy-mode-vi a switch-client -T copy-around

bind-key -T copy-in "'" send -X search-backward-text "'" \; send -X cursor-right \; send -X begin-selection \; send -X search-forward-text "'" \; send -X cursor-left
bind-key -T copy-in '"' send -X search-backward-text '"' \; send -X cursor-right \; send -X begin-selection \; send -X search-forward-text '"' \; send -X cursor-left
bind-key -T copy-in '`' send -X search-backward-text '`' \; send -X cursor-right \; send -X begin-selection \; send -X search-forward-text '`' \; send -X cursor-left
bind-key -T copy-in '(' send -X search-backward-text '(' \; send -X cursor-right \; send -X begin-selection \; send -X search-forward-text ')' \; send -X cursor-left
bind-key -T copy-in ')' send -X search-backward-text '(' \; send -X cursor-right \; send -X begin-selection \; send -X search-forward-text ')' \; send -X cursor-left
bind-key -T copy-in '{' send -X search-backward-text '{' \; send -X cursor-right \; send -X begin-selection \; send -X search-forward-text '}' \; send -X cursor-left
bind-key -T copy-in '}' send -X search-backward-text '{' \; send -X cursor-right \; send -X begin-selection \; send -X search-forward-text '}' \; send -X cursor-left
bind-key -T copy-in '[' send -X search-backward-text '[' \; send -X cursor-right \; send -X begin-selection \; send -X search-forward-text ']' \; send -X cursor-left
bind-key -T copy-in ']' send -X search-backward-text '[' \; send -X cursor-right \; send -X begin-selection \; send -X search-forward-text ']' \; send -X cursor-left

# AROUND (inclui os delimitadores)
bind-key -T copy-around "'" send -X search-backward-text "'" \; send -X begin-selection \; send -X search-forward-text "'"
bind-key -T copy-around '"' send -X search-backward-text '"' \; send -X begin-selection \; send -X search-forward-text '"'
bind-key -T copy-around '`' send -X search-backward-text '`' \; send -X begin-selection \; send -X search-forward-text '`'
bind-key -T copy-around '(' send -X search-backward-text '(' \; send -X begin-selection \; send -X search-forward-text ')'
bind-key -T copy-around ')' send -X search-backward-text '(' \; send -X begin-selection \; send -X search-forward-text ')'
bind-key -T copy-around '{' send -X search-backward-text '{' \; send -X begin-selection \; send -X search-forward-text '}'
bind-key -T copy-around '[' send -X search-backward-text '[' \; send -X begin-selection \; send -X search-forward-text ']'

########################## copy-mode #########################################################################################################
bind / copy-mode \; send-keys /

# selection
bind-key -T copy-mode-vi v send -X begin-selection
bind-key -T copy-mode-vi y send -X copy-selection-and-cancel
bind-key -T copy-mode-vi Y send-keys -X copy-line
bind-key -T copy-mode-vi D send-keys -X copy-end-of-line
bind-key -T copy-mode-vi A send-keys -X append-selection-and-cancel

# scroll com teclado
bind -T copy-mode-vi M-Up        send-keys -X scroll-up
bind -T copy-mode-vi M-Down      send-keys -X scroll-down
bind -T copy-mode-vi M-PageUp    send-keys -X halfpage-up
bind -T copy-mode-vi M-PageDown  send-keys -X halfpage-down
bind -T copy-mode-vi PageDown    send-keys -X page-down
bind -T copy-mode-vi PageUp      send-keys -X page-up

# scroll suave com trackpad (2 linhas por tick em vez de 5)
bind -T copy-mode-vi WheelUpPane   select-pane \; send-keys -X -N 2 scroll-up
bind -T copy-mode-vi WheelDownPane select-pane \; send-keys -X -N 2 scroll-down

# mouse: copy ao soltar drag sem cancelar; click pra limpar seleção
bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-selection
bind -T copy-mode-vi MouseDown1Pane    select-pane \; send-keys -X clear-selection

# double/triple click pra select-word / select-line
unbind -T copy-mode-vi DoubleClick1Pane
bind   -T copy-mode-vi DoubleClick1Pane select-pane \; send-keys -X select-word
unbind -T copy-mode-vi TripleClick1Pane
bind   -T copy-mode-vi TripleClick1Pane select-pane \; send-keys -X select-line

########################## plugins ###########################################################################################################
set -g @yank_selection 'clipboard'
set -g @yank_action 'copy-pipe'
set -g @shell_mode 'vi'

set -g @resurrect-capture-pane-contents 'off'

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-resurrect'

source ~/.themes/tmux/tmux.gruvbox-powerline.conf

run '~/.tmux/plugins/tpm/tpm'
